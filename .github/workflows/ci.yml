name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTESTSUM_FORMAT: pkgname-and-test-fails

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9

  unit:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: go build ./cmd/ember/

      - name: Test
        run: gotestsum --junitfile junit.xml -- ./... -race -shuffle=on -count=1 -coverprofile=coverage.txt

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-${{ matrix.os }}
          path: junit.xml
          if-no-files-found: ignore

  unit-nocolor:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: UI tests under NO_COLOR
        run: go test ./internal/ui/... -race -shuffle=on -count=1
        env:
          NO_COLOR: "1"

  integration:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Caddy
        run: |
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update
          sudo apt-get install -y caddy

      - name: Start Caddy
        run: |
          cat > /tmp/Caddyfile <<'CADDYFILE'
          {
            admin localhost:2099
            metrics
          }
          :8080 {
            respond "OK" 200
          }
          CADDYFILE
          caddy fmt --overwrite /tmp/Caddyfile
          caddy start --config /tmp/Caddyfile

      - name: Wait for Caddy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:2099/config/ > /dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "::error::Caddy failed to start within 30s"
          exit 1

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Integration tests
        run: gotestsum -- -tags integration -race -shuffle=on -count=1 -coverprofile=integration-coverage.txt ./internal/app/
        env:
          EMBER_TEST_CADDY_ADDR: http://localhost:2099

      - name: Upload integration coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: integration-coverage.txt
          flags: integration

  fuzz:
    # Warn-only at the start: surfaces new crashes without blocking PRs.
    # Promote to required once flake-free for ~2 weeks.
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run fuzz targets (30s each)
        run: ./scripts/run_fuzz.sh 30s

      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: |
            **/testdata/fuzz/**
          if-no-files-found: ignore

