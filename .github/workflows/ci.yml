name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/ember/

      - name: Test
        run: go test ./... -race -v -coverprofile=coverage.txt

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Start Caddy
        run: |
          sudo systemctl stop caddy || true
          caddy stop || true
          cat > /tmp/Caddyfile <<'CADDYFILE'
          {
            admin localhost:2019
            metrics
          }
          :80 {
            respond "OK" 200
          }
          CADDYFILE
          caddy fmt --overwrite /tmp/Caddyfile
          caddy start --config /tmp/Caddyfile

      - name: Wait for Caddy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:2019/config/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Integration tests
        run: go test -tags integration -race -v ./internal/app/
