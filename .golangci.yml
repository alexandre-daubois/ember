version: "2"

linters:
  enable:
    - bodyclose
    - errorlint
    - exhaustive
    - gocritic
    - misspell
    - nolintlint
    - testifylint
    - usestdlibvars
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - appendAssign
        - evalOrder
        - ifElseChain
        - sprintfQuotedString
    nolintlint:
      require-explanation: true
    testifylint:
      disable:
        - float-compare

formatters:
  enable:
    - gofmt
