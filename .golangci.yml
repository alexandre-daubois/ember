version: "2"

linters:
  enable:
    - bodyclose
    - exhaustive
    - misspell
    - nolintlint
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-explanation: true

formatters:
  enable:
    - gofmt
